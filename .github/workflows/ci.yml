name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools (needed by node-gyp)
        run: pip install setuptools

      - name: Delete lockfile
        run: node -e "try{require('fs').unlinkSync('package-lock.json')}catch{}"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Electron smoke test (macOS only)
        if: matrix.os == 'macos-latest'
        run: npm run test:smoke:electron

      # Functional drag/dock/detach e2e. Runs windowless on macOS (no display
      # server needed); the perf-stress spec is skipped via E2E_SKIP_PERF since
      # its thresholds depend on raw runner speed.
      - name: E2E tests (macOS only)
        if: matrix.os == 'macos-latest'
        run: npm run test:e2e:ci
